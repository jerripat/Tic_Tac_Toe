<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tic Tac Toe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Boldonse&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="styles/styles.css">
     <link rel="stylesheet" type="text/css" href="styles/overlays.css">
    <link rel="stylesheet" type="text/css" href="styles/configuration.css">
</head>
<body>
<div id="backdrop"></div>
<header id="main-header">
    <h1>Play Tic Tac Toe</h1>
    <p>Built with HTML, CSS and Javascript</p>
</header>

<main>
    <aside class="modal" id="config-overlay">
        <h2>Choose your name</h2>
        <form>
            <div class="form-control">
                <label for="playername">Player name</label>
                <input type="text" name="username" id="playername"/>
            </div>
            <div>
                <button type="button" class="btn btn-alt">Cancel</button>
                <button type="submit" class="btn">Confirm</button>

            </div>

        </form>
    </aside>
    <section id="game-configuration">
        <ol>
            <li>
                <article>
                    <h2>Player 1</h2>
                    <h3>PLAYER NAME</h3>
                    <p>X</p>
                    <button class="btn btn-alt">Edit</button>
                </article>
            </li>
            <li>
                <article>
                    <h2>Player 2</h2>
                    <h3>PLAYER NAME</h3>
                    <p>O</p>
                    <button class="btn btn-alt">Edit</button>
                </article>
            </li>
            <button class="btn">Start New Game</button>
        </ol>

    </section>
    <section id="active-game">
        <article>
            <h3>You Won, <span id="winner-name">PLAYER NAME</span>!</h3>
            <p>Click "Start new game" to start a new game!</p>
        </article>

        <p>It's your turn <span id="active-player-name">PLAYER NAME</span>!</p>
        <ol>
            <li></li>
            <li></li>
            <li></li>

            <li></li>
            <li></li>
            <li></li>

            <li></li>
            <li></li>
            <li></li>
        </ol>

    </section>
</main>


</body>
</html>
